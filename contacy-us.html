    <body>
        <header>
            <a href="#" class='logo'>Courses</a>

                    <a href="index.html">Home</a>

                    <a href="add-courses.html">Add Courses</a>
                    <a href="contacy-us.html">Contact Us</a>       
            </nav>
        </header>
        <div class="contact-page">
        <div class="contact-box">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you</p>
            <div class="input-group">
                <label>Your Name</label>
                <input type="text" placeholder="Enter your name">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea rows="4" placeholder="Write your message here..."></textarea>
            </div>
            <div class="contact-buttons">
                <button class="send">Send Message</button>
                <button class="clear">Clear</button>
            </div>
        </div>
    </div>
    <footer style="text-align: center; margin-top: 50px; padding: 20px; background: #f0f0f0;">
