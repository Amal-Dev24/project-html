<!doctype html>
<html>     
    <head>
        <meta charset='UTF-8'/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="project.css">
        <title>courses</title> 
    </head>
    <body>
       <header>
            <a href="#" class='logo'>Courses</a>
            <nav>   <a href="index.html">Home</a>
                    <a href="my-courses.html">My Courses</a>
                    <a href="add-courses.html">Add Courses</a>
                    <a href="contacy-us.html">Contact Us</a>    
            </nav>
        </header>
        <section> 
        <div class="add-course-page">
        <div class="form-box">
            <h1>Add New Course</h1>
            <p>Fill the form to add a new course</p>
            <form>
                <div class="input-group">
                    <label>Course Name</label>
                    <input type="text" placeholder="Enter course name">
                </div>
                <div class="input-group">
                    <label>Instructor</label>
                    <input type="text" placeholder="Enter instructor name">
                </div>
                <div class="input-group">
                    <label>Credit Hours</label>
                    <input type="number" placeholder="Enter credit hours">
                </div>
                <div class="input-group">
                    <label>Notes</label>
                    <textarea rows="4" placeholder="Enter any notes..."></textarea>
                </div>
                <div class="input-group">
                    <label>Status</label>
                    <select>
                        <option>Not Started</option>
                        <option>In Progress</option>
                        <option>Completed</option>
                    </select>
                </div>
                <div class="buttons">
                    <button type="submit" class="add">Add Course</button>
                    <button type="reset" class="clear">Clear</button>
                </div>
            </form>
            </section>
        </div>
    </div>
    </body>
</html>
